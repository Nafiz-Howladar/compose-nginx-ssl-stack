<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevOps Todo App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 24px;
      color: #1a1a2e;
      margin-bottom: 4px;
    }
    .subtitle {
      color: #888;
      font-size: 13px;
      margin-bottom: 24px;
    }
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #4f46e5; }
    button.add-btn {
      padding: 10px 20px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }
    button.add-btn:hover { background: #3730a3; }
    .todo-list { list-style: none; }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .todo-item:last-child { border-bottom: none; }
    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #4f46e5;
      flex-shrink: 0;
    }
    .todo-text {
      flex: 1;
      font-size: 14px;
      color: #333;
      transition: all 0.2s;
    }
    .todo-text.done {
      text-decoration: line-through;
      color: #aaa;
    }
    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      transition: color 0.2s;
    }
    .delete-btn:hover { color: #ef4444; }
    .empty {
      text-align: center;
      color: #bbb;
      font-size: 14px;
      padding: 24px 0;
    }
    .status {
      font-size: 12px;
      color: #888;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }
    .dot.red { background: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Todo App by Nafiz</h1>
    <p class="subtitle">Powered by Docker Compose + Nginx + MongoDB</p>

    <div class="status">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Connecting to API...</span>
    </div>

    <div class="input-row">
      <input type="text" id="todoInput" placeholder="Add a new todo..." />
      <button class="add-btn" onclick="addTodo()">Add</button>
    </div>

    <ul class="todo-list" id="todoList">
      <li class="empty">Loading...</li>
    </ul>
  </div>

  <script>
    const API = '/api';

    async function checkHealth() {
      try {
        const res = await fetch(`${API}/health`);
        const data = await res.json();
        if (data.status === 'ok') {
          document.getElementById('statusDot').classList.remove('red');
          document.getElementById('statusText').textContent = 'API Connected ✓';
        }
      } catch {
        document.getElementById('statusDot').classList.add('red');
        document.getElementById('statusText').textContent = 'API Disconnected';
      }
    }

    async function loadTodos() {
      try {
        const res = await fetch(`${API}/todos`);
        const todos = await res.json();
        const list = document.getElementById('todoList');
        if (todos.length === 0) {
          list.innerHTML = '<li class="empty">No todos yet. Add one above!</li>';
          return;
        }
        list.innerHTML = todos.map(todo => `
          <li class="todo-item">
            <input type="checkbox" ${todo.completed ? 'checked' : ''}
              onchange="toggleTodo('${todo._id}', this.checked)" />
            <span class="todo-text ${todo.completed ? 'done' : ''}">${todo.text}</span>
            <button class="delete-btn" onclick="deleteTodo('${todo._id}')">✕</button>
          </li>
        `).join('');
      } catch (e) {
        document.getElementById('todoList').innerHTML = '<li class="empty">Could not load todos.</li>';
      }
    }

    async function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (!text) return;
      await fetch(`${API}/todos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      input.value = '';
      loadTodos();
    }

    async function toggleTodo(id, completed) {
      await fetch(`${API}/todos/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ completed })
      });
      loadTodos();
    }

    async function deleteTodo(id) {
      await fetch(`${API}/todos/${id}`, { method: 'DELETE' });
      loadTodos();
    }

    document.getElementById('todoInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') addTodo();
    });

    checkHealth();
    loadTodos();
  </script>
</body>
</html>
