version: '3.8'

services:

  frontend:
    build: ./frontend
    container_name: todo-frontend
    restart: always
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: todo-backend
    restart: always
    environment:
      - MONGO_URI=mongodb://mongo:27017/todos
      - PORT=5000
    depends_on:
      - mongo
    networks:
      - app-network

  mongo:
    image: mongo:6
    container_name: todo-mongo
    restart: always
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: todo-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
